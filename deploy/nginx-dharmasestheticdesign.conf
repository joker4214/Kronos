# nginx reverse proxy for dharmasestheticdesign.com
# Fixes the earlier "all cream" / broken-styles deploy issue: PM2 serving
# Next.js directly on :80 dropped /_next/static/* under load. nginx in
# front, proxying to the app on an internal port, is what's reliable.
#
# Install: sudo cp deploy/nginx-dharmasestheticdesign.conf /etc/nginx/sites-available/dharmasestheticdesign
#          sudo ln -s /etc/nginx/sites-available/dharmasestheticdesign /etc/nginx/sites-enabled/
#          sudo nginx -t && sudo systemctl restart nginx
#
# Once DNS for dharmasestheticdesign.com points at this server, run:
#   sudo certbot --nginx -d dharmasestheticdesign.com -d www.dharmasestheticdesign.com
# to add HTTPS (certbot rewrites this file to add the 443 server block).

server {
    listen 80;
    listen [::]:80;
    server_name dharmasestheticdesign.com www.dharmasestheticdesign.com;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
