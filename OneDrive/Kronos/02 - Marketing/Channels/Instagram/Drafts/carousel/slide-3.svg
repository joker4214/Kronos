<svg viewBox="0 0 1080 1080" xmlns="http://www.w3.org/2000/svg">
  <rect width="1080" height="1080" fill="#1B2A3D"/>
  <rect x="0" y="0" width="1080" height="8" fill="#CC6B49"/>
  <rect x="0" y="1072" width="1080" height="8" fill="#CC6B49"/>

  <!-- Slide number -->
  <text x="60" y="130" font-family="Georgia, serif" font-size="22" fill="#CC6B49" letter-spacing="4" opacity="0.7">03 / 05</text>
  <line x1="60" y1="150" x2="340" y2="150" stroke="#CC6B49" stroke-width="1" opacity="0.4"/>

  <!-- Sign number -->
  <text x="60" y="280" font-family="Georgia, serif" font-size="160" font-weight="700" fill="#CC6B49" opacity="0.15">2</text>
  <text x="60" y="290" font-family="Georgia, serif" font-size="22" fill="#CC6B49" letter-spacing="5">SIGN TWO</text>

  <!-- Main text -->
  <text x="60" y="420" font-family="Georgia, serif" font-size="72" font-weight="700" fill="#FBF1E6">Your visuals</text>
  <text x="60" y="510" font-family="Georgia, serif" font-size="72" font-weight="700" fill="#FBF1E6">don't match</text>
  <text x="60" y="600" font-family="Georgia, serif" font-size="72" font-weight="700" fill="#FBF1E6">across</text>
  <text x="60" y="690" font-family="Georgia, serif" font-size="72" font-weight="700" fill="#CC6B49">platforms.</text>

  <!-- Supporting copy -->
  <line x1="60" y1="740" x2="1020" y2="740" stroke="#FBF1E6" stroke-width="1" opacity="0.15"/>
  <text x="60" y="800" font-family="Georgia, serif" font-size="34" fill="#FBF1E6" opacity="0.65">Inconsistent branding loses trust</text>
  <text x="60" y="848" font-family="Georgia, serif" font-size="34" fill="#FBF1E6" opacity="0.65">before anyone reads a word.</text>

  <!-- Logo mark -->
  <circle cx="980" cy="980" r="68" fill="none" stroke="#CC6B49" stroke-width="1.2"/>
  <text x="980" y="1002" font-family="Georgia, serif" font-size="56" font-weight="700" fill="#FBF1E6" text-anchor="middle">D</text>
  <text x="980" y="952" font-family="Georgia, serif" font-size="10" fill="#CC6B49" text-anchor="middle" letter-spacing="3">DHARMA'S</text>
</svg>
