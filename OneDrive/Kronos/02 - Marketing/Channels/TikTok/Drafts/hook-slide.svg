<svg viewBox="0 0 1080 1920" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1080" height="1920" fill="#1B2A3D"/>

  <!-- Terracotta diagonal accent block -->
  <polygon points="0,1400 1080,1100 1080,1920 0,1920" fill="#CC6B49" opacity="0.12"/>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="1080" height="10" fill="#CC6B49"/>

  <!-- Decorative rings — background texture -->
  <circle cx="900" cy="200" r="320" fill="none" stroke="#CC6B49" stroke-width="1" opacity="0.08"/>
  <circle cx="900" cy="200" r="240" fill="none" stroke="#CC6B49" stroke-width="1" opacity="0.08"/>
  <circle cx="150" cy="1700" r="280" fill="none" stroke="#CC6B49" stroke-width="1" opacity="0.08"/>
  <circle cx="150" cy="1700" r="200" fill="none" stroke="#CC6B49" stroke-width="1" opacity="0.08"/>

  <!-- DHARMA'S badge top left -->
  <circle cx="100" cy="140" r="72" fill="none" stroke="#CC6B49" stroke-width="1.5"/>
  <text x="100" y="128" font-family="Georgia, serif" font-size="8" fill="#CC6B49" text-anchor="middle" letter-spacing="2">DHARMA'S</text>
  <text x="100" y="158" font-family="Georgia, serif" font-size="44" font-weight="700" fill="#FBF1E6" text-anchor="middle">D</text>

  <!-- Thin rule -->
  <line x1="60" y1="240" x2="500" y2="240" stroke="#CC6B49" stroke-width="1" opacity="0.4"/>
  <text x="60" y="274" font-family="Georgia, serif" font-size="22" fill="#CC6B49" letter-spacing="5" opacity="0.8">FOR SHOPIFY STORE OWNERS</text>

  <!-- Main headline — big and bold -->
  <text x="60" y="500" font-family="Georgia, serif" font-size="130" font-weight="700" fill="#FBF1E6">Your</text>
  <text x="60" y="640" font-family="Georgia, serif" font-size="130" font-weight="700" fill="#FBF1E6">store</text>
  <text x="60" y="780" font-family="Georgia, serif" font-size="130" font-weight="700" fill="#FBF1E6">looks</text>
  <text x="60" y="920" font-family="Georgia, serif" font-size="130" font-weight="700" fill="#CC6B49">amazing.</text>

  <!-- Pause line -->
  <line x1="60" y1="970" x2="1020" y2="970" stroke="#FBF1E6" stroke-width="1.5" opacity="0.15"/>

  <!-- Second line — the twist -->
  <text x="60" y="1080" font-family="Georgia, serif" font-size="72" fill="#FBF1E6" opacity="0.5">So why isn't</text>
  <text x="60" y="1170" font-family="Georgia, serif" font-size="72" fill="#FBF1E6" opacity="0.5">anyone</text>
  <text x="60" y="1260" font-family="Georgia, serif" font-size="100" font-weight="700" fill="#FBF1E6">buying?</text>

  <!-- Terracotta underline on buying -->
  <rect x="60" y="1272" width="560" height="6" rx="3" fill="#CC6B49"/>

  <!-- Bottom section -->
  <line x1="60" y1="1400" x2="1020" y2="1400" stroke="#CC6B49" stroke-width="1" opacity="0.3"/>

  <text x="60" y="1480" font-family="Georgia, serif" font-size="38" fill="#FBF1E6" opacity="0.7">You don't have a sales problem.</text>
  <text x="60" y="1536" font-family="Georgia, serif" font-size="38" fill="#CC6B49">You have a visibility problem.</text>

  <!-- CTA box -->
  <rect x="60" y="1620" width="680" height="100" rx="10" fill="#CC6B49"/>
  <text x="400" y="682" font-family="Georgia, serif" font-size="34" font-weight="700" fill="#FBF1E6" text-anchor="middle">Comment "GROWTH" ↓</text>
  <text x="400" y="1685" font-family="Georgia, serif" font-size="34" font-weight="700" fill="#FBF1E6" text-anchor="middle">Comment "GROWTH" ↓</text>

  <!-- Bottom accent -->
  <rect x="0" y="1910" width="1080" height="10" fill="#CC6B49"/>
</svg>
