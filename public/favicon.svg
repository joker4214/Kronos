<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Dharma's Esthetic Design Center badge logo mark">
  <!-- Main circle -->
  <circle cx="100" cy="100" r="96" fill="#1B2A3D"/>
  <!-- Outer ring -->
  <circle cx="100" cy="100" r="92" fill="none" stroke="#CC6B49" stroke-width="1.5"/>
  <!-- Inner ring -->
  <circle cx="100" cy="100" r="85" fill="none" stroke="#CC6B49" stroke-width="0.5" opacity="0.4"/>

  <!-- Horizontal accent lines -->
  <line x1="22" y1="76" x2="178" y2="76" stroke="#CC6B49" stroke-width="0.6" opacity="0.4"/>
  <line x1="22" y1="128" x2="178" y2="128" stroke="#CC6B49" stroke-width="0.6" opacity="0.4"/>

  <!-- Bold D -->
  <text x="100" y="130" font-family="Georgia, 'Times New Roman', serif" font-size="96" font-weight="700" fill="#FBF1E6" text-anchor="middle">D</text>
  <!-- Subtle E monogram overlay -->
  <text x="114" y="130" font-family="Georgia, 'Times New Roman', serif" font-size="58" font-weight="400" fill="#CC6B49" text-anchor="middle" opacity="0.28">E</text>

  <!-- DHARMA'S — rendered last so it sits in front of the D -->
  <text x="100" y="70" font-family="Georgia, 'Times New Roman', serif" font-size="11.5" fill="#CC6B49" text-anchor="middle" letter-spacing="5">DHARMA'S</text>

  <!-- Curved bottom text -->
  <defs>
    <path id="bottomCurve" d="M 22,132 A 82,82 0 0,0 178,132"/>
  </defs>
  <text font-family="Georgia, 'Times New Roman', serif" font-size="9" fill="#FBF1E6" letter-spacing="3.5" opacity="0.75">
    <textPath href="#bottomCurve" startOffset="50%" text-anchor="middle">· ESTHETIC DESIGN CENTER ·</textPath>
  </text>
</svg>
